apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-manager
  namespace: {{ .Values.global.namespace }}
  labels:
    app: deployment-manager
spec:
  selector:
    matchLabels:
      app: deployment-manager
  template:
    metadata:
      labels:
        app: deployment-manager
    spec:
      initContainers:
      - name: wait-for-db
        image: postgres:16-alpine
        command: ['sh', '-c', 'until pg_isready -h controlpanel-db-service -p 5432 -U $(POSTGRES_USER); do echo waiting for db; sleep 2; done']
        env:
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: controlpanel-db-secrets
                key: POSTGRES_USER
      - name: wait-for-api
        image: busybox
        command: ['sh', '-c', 'until nc -z -v controlpanel-api-service 80; do echo waiting for db; sleep 2; done']
      containers:
        - name: deployment-manager
          image: {{ .Values.image }}
          imagePullPolicy: Always
          ports:
          - containerPort: 3000
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DB_PORT
              value: {{ .Values.global.db_port | quote }}
            - name: DB_HOST
              value: {{ .Values.global.db_host }}
          envFrom:
            - secretRef:
                name: deployment-manager-db-secrets
      serviceAccountName: deployment-manager-sa
