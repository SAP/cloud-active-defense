apiVersion: gateway.kyma-project.io/v2
kind: APIRule
metadata:
  name: keycloak-apirule
  namespace: {{ .Values.global.namespace }}
  labels:
    app: keycloak
spec:
  hosts: 
    - keycloak
  service:
    name: keycloak-service
    port: 80
  gateway: kyma-system/kyma-gateway
  corsPolicy:
    allowOrigins:
      - prefix: {{ printf "%s.%s" .Values.global.front_url (trimPrefix "." .Values.global.kyma_domain) }}
    allowMethods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowHeaders:
      - Authorization
      - Content-Type
    exposeHeaders:
      - Content-Type
    allowCredentials: true
  rules:
    - path: /*
      methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
      noAuth: true
