apiVersion: gateway.kyma-project.io/v2
kind: APIRule
metadata:
  name: controlpanel-front-apirule
  namespace: {{ .Values.global.namespace }}
  labels:
    app: controlpanel-front
spec:
  hosts: 
    - controlpanel-front
  service:
    name: controlpanel-front-service
    port: 80
  gateway: kyma-system/kyma-gateway
  rules:
    - path: /*
      methods: ["GET"]
      noAuth: true
